name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-sentence-transformers-all-MiniLM-L6-v2
          restore-keys: |
            hf-${{ runner.os }}-sentence-transformers-all-MiniLM-L6-v2-

      - name: Run unit tests with coverage
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: |
          coverage run -m unittest discover -s tests -v
          # Threshold is intentionally conservative. Current: ~57%.
          # After v1.2.0 scraper tests merge: ~75%. Raise as coverage grows.
          coverage report --fail-under=50

      - name: Run fresh-install smoke test
        run: python scripts/smoke_test.py
